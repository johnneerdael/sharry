# Sharry (Netskope Secure File Transfer) runtime config.
# Values are pulled from environment variables via HOCON `${VAR}` substitution.
# See docker/.env.template for the full list.

sharry.restserver {

  base-url = ${SHARRY_BASE_URL}

  bind {
    address = "0.0.0.0"
    port = 9090
  }

  backend {
    auth {
      fixed.enabled = ${SHARRY_FIXED_ENABLED}
    }

    jdbc {
      url = "jdbc:postgresql://db:5432/"${POSTGRES_DB}
      user = ${POSTGRES_USER}
      password = ${POSTGRES_PASSWORD}
    }

    signup {
      mode = ${SHARRY_SIGNUP_MODE}
      invite-time = "14 days"
      invite-password = ${SHARRY_INVITE_PASSWORD}
    }
  }

}
